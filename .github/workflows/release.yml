name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each macOS arch builds on its native runner — node-pty's prebuilt binary only installs
          # for the host (os, cpu), so cross-compiling would ship a broken PTY.
          - os: macos-14 # Apple Silicon
            artefact: pi-deck-macos-arm64
            builder_args: "--arm64"
          - os: macos-13 # Intel
            artefact: pi-deck-macos-x64
            builder_args: "--x64"
          - os: ubuntu-latest
            artefact: pi-deck-linux
            builder_args: ""
          - os: windows-latest
            artefact: pi-deck-windows
            builder_args: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache Electron downloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package desktop app
        working-directory: packages/desktop
        run: bun run dist -- ${{ matrix.builder_args }}

      - name: Upload artefact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artefact }}
          # Only the user-facing distributables — a single `*` keeps the unpacked app trees
          # (out/mac/, out/win-unpacked/, …) out of the artefact. Per-OS patterns that don't
          # match on a given runner are simply ignored.
          path: |
            packages/desktop/out/*.dmg
            packages/desktop/out/*.zip
            packages/desktop/out/*.exe
            packages/desktop/out/*.AppImage
            packages/desktop/out/*.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Draft GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Download all artefacts
        uses: actions/download-artifact@v8
        with:
          path: artefacts

      - name: Generate release notes
        run: bun scripts/release-notes.ts > release-notes.md

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: false
          body_path: release-notes.md
          files: |
            artefacts/**/*
