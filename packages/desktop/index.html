<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pi-deck</title>
    <script>
      // Pre-mount hydration. Sets data-* attributes so the first paint matches the user's stored
      // theme/density/fonts without flashing the default palette. The full per-token JSON is
      // applied later by ThemeProvider once the WS client is connected.
      (() => {
        var root = document.documentElement;
        var raw = null;
        var prefs = {};
        var themeName = null;
        var themeKind = null;
        var mql = null;
        try {
          raw = localStorage.getItem("pi-deck:prefs");
          if (raw) {
            try {
              prefs = JSON.parse(raw).state || {};
            } catch {
              prefs = {};
            }
          }
          themeName = localStorage.getItem("pi-deck:active-theme");
          themeKind = localStorage.getItem("pi-deck:active-theme-kind");
          if (!themeName) {
            mql = window.matchMedia?.("(prefers-color-scheme: light)");
            if (mql?.matches) {
              themeName = "almanac";
              themeKind = "light";
            } else {
              themeName = "forge";
              themeKind = "dark";
            }
          }
          // Theme names no longer encode light/dark, so the persisted kind drives the first paint.
          // The "-light" suffix stays as a fallback for any legacy/user theme named that way.
          if (themeKind === "light" || themeName.indexOf("-light") !== -1) {
            root.setAttribute("data-theme", "light");
          }
          if (prefs.density === "cozy") root.setAttribute("data-density", "cozy");
          if (prefs.fonts && prefs.fonts !== "default") root.setAttribute("data-fonts", prefs.fonts);
        } catch {
          // ignore — fall back to CSS defaults
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/renderer/main.tsx"></script>
  </body>
</html>
