appId: dev.pi-deck
productName: pi-deck
copyright: Copyright © 2026 pi-deck
asar: true
# Native modules can't be loaded from inside the asar archive — unpack node-pty (and its
# platform-specific prebuilt binary package) so the *.node binding resolves at runtime.
asarUnpack:
  - "**/node_modules/@lydell/node-pty/**"
  - "**/node_modules/@lydell/node-pty-*/**"
  - "**/node_modules/node-pty/**"
directories:
  output: out
  buildResources: build
files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
  - package.json
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
