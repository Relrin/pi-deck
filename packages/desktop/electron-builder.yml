appId: dev.pi-deck
productName: pi-deck
copyright: Copyright © 2026 pi-deck
# Every OS/arch is built in its own matrix job and attached to one GitHub release, so artefact
# names must be unique across the whole matrix — include ${os} and ${arch} to avoid collisions
# (the .deb keeps its conventional name via the `deb.artifactName` override below).
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
# Native modules can't be loaded from inside the asar archive — unpack node-pty (and its
# platform-specific prebuilt binary package) so the *.node binding resolves at runtime.
asarUnpack:
  - "**/node_modules/@lydell/node-pty/**"
  - "**/node_modules/@lydell/node-pty-*/**"
  - "**/node_modules/node-pty/**"
directories:
  output: out
  buildResources: build
files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
  - package.json
mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  # Arch is selected per runner by the release workflow (`--arm64` / `--x64`) so each build runs on
  # a native macOS runner. node-pty ships per-(os,cpu) prebuilt binaries that only install on a
  # matching host, so cross-compiling x64 on an Apple-Silicon runner would ship a broken PTY.
  # A local `bun run dist` (no flag) builds the host arch only.
  target:
    - dmg
    - zip
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
linux:
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

# The deb target's default artefact-name template uses the npm package name, which is scoped
# (@pi-deck/desktop). The "/" makes fpm try to write into a non-existent out/@pi-deck/ subdir, so
# name the .deb after productName instead. (AppImage already uses productName by default.)
deb:
  artifactName: ${productName}_${version}_${arch}.${ext}
